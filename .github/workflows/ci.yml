name: ML CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - run: pip install -r requirements.txt

      - run: pytest

      - run: dvc repro
